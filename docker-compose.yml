version: '3.9'

services:
  auth-db:
    build:
      context: ./DB/migrations
      dockerfile: Dockerfile
    container_name: auth-db
    environment:
      POSTGRES_DB: '${POSTGRES_DB}'
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    ports:
      - '${POSTGRES_PORT}:5432'
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}' ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - auth_pgdata:/var/lib/postgresql/data

  my-storage-service:
    build:
      context: ./BE/GO/my-storage-service
      dockerfile: Dockerfile
    container_name: my-storage-service
    environment:
      APP_PORT: '8080'
      DB_DSN: 'host=${POSTGRES_HOST} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} port=${POSTGRES_PORT} sslmode=disable TimeZone=UTC'
      JWT_SECRET: '${JWT_SECRET}'
      JWT_REFRESH_SECRET: '${JWT_REFRESH_SECRET}'
      JWT_EXPIRES_IN_MINUTES: '${JWT_EXPIRES_IN_MINUTES}'
      JWT_REFRESH_EXPIRES_IN_MINUTES: '${JWT_REFRESH_EXPIRES_IN_MINUTES}'
    ports:
      - '8080:8080'
    depends_on:
      auth-db:
        condition: service_healthy

  my-storage:
    build:
      context: ./FE/NEXT/my-storage
      dockerfile: Dockerfile
    container_name: my-storage
    environment:
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      - my-storage-service

volumes:
  auth_pgdata:
