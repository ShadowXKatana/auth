version: '3.9'

services:
  auth-db:
    build:
      context: ./DB/migrations
      dockerfile: Dockerfile
    container_name: auth-db
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-auth}'
      POSTGRES_USER: '${POSTGRES_USER:-auth}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-auth}'
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-auth} -d ${POSTGRES_DB:-auth}']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - auth_pgdata:/var/lib/postgresql/data

  my-storage-service:
    build:
      context: ./BE/GO/my-storage-service
      dockerfile: Dockerfile
    container_name: my-storage-service
    environment:
      APP_PORT: '8080'
      DB_DSN: 'host=auth-db user=${POSTGRES_USER:-auth} password=${POSTGRES_PASSWORD:-auth} dbname=${POSTGRES_DB:-auth} port=5432 sslmode=disable TimeZone=UTC'
      JWT_SECRET: '${JWT_SECRET:-change-me}'
      JWT_REFRESH_SECRET: '${JWT_REFRESH_SECRET:-change-me-refresh}'
      JWT_EXPIRES_IN_MINUTES: '${JWT_EXPIRES_IN_MINUTES:-60}'
      JWT_REFRESH_EXPIRES_IN_MINUTES: '${JWT_REFRESH_EXPIRES_IN_MINUTES:-10080}'
    ports:
      - '8080:8080'
    depends_on:
      auth-db:
        condition: service_healthy

  my-storage:
    build:
      context: ./FE/NEXT/my-storage
      dockerfile: Dockerfile
    container_name: my-storage
    environment:
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      - my-storage-service

volumes:
  auth_pgdata:
