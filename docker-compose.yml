version: '3.9'

services:
  auth-db:
    build:
      context: ./DB/migrations
      dockerfile: Dockerfile
    container_name: auth-db
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U auth -d auth']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - auth_pgdata:/var/lib/postgresql/data

volumes:
  auth_pgdata:
