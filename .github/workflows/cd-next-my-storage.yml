name: CD – Next.js my-storage → AWS EC2

# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID        – IAM user access key with ECR push & EC2 describe permissions
#   AWS_SECRET_ACCESS_KEY    – IAM user secret key
#   AWS_REGION               – e.g. ap-southeast-1
#   ECR_REPOSITORY           – ECR repository name, e.g. my-storage
#   EC2_HOST                 – public IP or hostname of the EC2 instance
#   EC2_USER                 – SSH user on the EC2 instance (e.g. ubuntu or ec2-user)
#   EC2_SSH_KEY              – PEM private key for SSH access (-----BEGIN RSA PRIVATE KEY-----)

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'FE/NEXT/my-storage/**'
  #     - '.github/workflows/cd-next-my-storage.yml'

permissions:
  contents: read

jobs:
  # ── 1. Build & push Docker image to Amazon ECR ──────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build-image.outputs.image }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            FE/NEXT/my-storage
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ── 2. Deploy to AWS EC2 ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,IMAGE
          script: |
            # Log in to ECR (EC2 must have AWS CLI installed)
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # Pull the new image
            docker pull "$IMAGE"

            # Stop and remove the old container (ignore errors if not running)
            docker stop my-storage || true
            docker rm   my-storage || true

            # Start the new container
            docker run -d \
              --name my-storage \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              "$IMAGE"

            # Clean up dangling images
            docker image prune -f
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr_registry }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
